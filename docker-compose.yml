version: '3.8'

services: 
  #-------backend----------
  backend:
    build: ./backend
    container_name: securelab-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/securelab
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - securelab-net

  #-------frontend----------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: securelab-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - securelab-net

  #-------mongodb----------
  mongo:
    image: mongo:7
    container_name: securelab-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - securelab-net

volumes:
  mongo-data:


networks:
  securelab-net:
    driver: bridge
